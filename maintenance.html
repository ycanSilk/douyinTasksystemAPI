<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>系统维护中 - kkTaskPaaS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .maintenance-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: rotate 2s infinite ease-in-out;
        }
        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .domain {
            display: inline-block;
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #667eea;
            margin-bottom: 24px;
            font-family: monospace;
        }
        p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .message-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 24px 0;
            text-align: left;
        }
        .message-box p {
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 24px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            animation: loading 2s infinite ease-in-out;
        }
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .contact {
            font-size: 14px;
            color: #999;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .contact a {
            color: #667eea;
            text-decoration: none;
        }
        .contact a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 24px;
            }
            p {
                font-size: 16px;
            }
            .icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon">🛠️✨</div>
        <h1>系统维护升级中</h1>
       
        <p>为了给您提供更好的服务体验，我们正在进行计划内的系统升级维护。</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p>感谢您的理解与耐心等待！</p>
        <div class="contact">
            如有紧急问题，请联系客服<br>
        </div>
    </div>
    <script>
        // 显示当前访问的域名
        var hostname = window.location.hostname;
        var domainElement = document.getElementById('domainDisplay');
        if (domainElement && hostname) {
            domainElement.textContent = hostname;
        }
        // 自动刷新检测（每60秒检查一次，如果维护结束则自动跳转）
        setTimeout(function() {
            location.reload();
        }, 60000);
    </script>
</body>
</html>
