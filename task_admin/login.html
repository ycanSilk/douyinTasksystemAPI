<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Admin - 登录</title>
    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            animation: fade-in 0.5s ease-out;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-box h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }
        .login-box .subtitle {
            margin: 0 0 32px 0;
            font-size: 14px;
            color: #666;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .error-message {
            margin-top: 16px;
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box fade-in">
            <div style="margin-bottom: 24px;">
                <i class="ri-admin-line" style="font-size: 48px; color: #667eea;"></i>
            </div>
            <h1>Task Admin</h1>
            <p class="subtitle">智能管理后台</p>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">
                    登录系统 <i class="ri-arrow-right-line"></i>
                </button>
            </form>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js"></script>
    <script>
        // API基础URL
        const API_BASE = '/task_admin';

        // 登录表单
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            // MD5加密密码
            const hashedPassword = md5(password);
          
            try {
                const res = await fetch(`${API_BASE}/auth/login.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password: hashedPassword })
                });
                
                console.log('响应状态码:', res.status);
                console.log('响应头:', res.headers);
                
                const responseText = await res.text();
                console.log('响应文本:', responseText);
                
                try {
                    const data = JSON.parse(responseText);
                    console.log('解析后的响应数据:', data);
                    
                    if (data.code === 0) {
                        console.log('登录成功，用户信息:', data.data);
                        sessionStorage.setItem('admin_logged_in', 'true');
                        sessionStorage.setItem('admin_username', data.data.username);
                        sessionStorage.setItem('admin_token', data.data.token);
                        // 登录成功后跳转到主页面
                        window.location.href = `${API_BASE}/index.html`;
                    } else {
                        console.log('登录失败，错误信息:', data.message);
                        errorDiv.innerHTML = `<i class="ri-error-warning-line"></i> ${data.message}`;
                    }
                } catch (parseError) {
                    console.error('JSON解析错误:', parseError);
                    console.error('原始响应:', responseText);
                    errorDiv.innerHTML = `<i class="ri-error-warning-line"></i> 服务器响应格式错误`;
                }
            } catch (err) {
                console.error('网络请求失败:', err);
                errorDiv.innerHTML = `<i class="ri-wifi-off-line"></i> 登录失败，请检查网络连接`;
            }
        });
    </script>
</body>
</html>
