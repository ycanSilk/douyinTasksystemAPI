<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B端数据统计</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- 配置Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Microsoft YaHei', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .chart-container {
                @apply relative h-[300px] min-h-[250px];
            }
            @screen md {
                .chart-container {
                    @apply h-[250px];
                }
            }
            @screen sm {
                .chart-container {
                    @apply h-[200px];
                }
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="container mx-auto px-4 py-6">
        <h1 class="text-2xl font-semibold text-gray-800 mb-6">B端数据统计</h1>
         <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                    <svg class="w-6 h-6 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <h3 class="text-lg font-semibold text-gray-800">统计概览</h3>
                    <span class="ml-auto text-xs bg-green-50 text-green-700 px-3 py-1 rounded-full">概览分析</span>
                </div>
        <!-- 统计概览卡片 -->
        <div class="grid grid-cols-3 gap-4 mb-6">
           
            <div class="bg-white rounded-xl shadow-md border border-gray-200 py-1 px-5 text-center">
                <div class="text-xl font-bold text-blue-600" id="totalTasks">0</div>
                <div class="text-sm text-gray-600 mt-1">总任务数</div>
            </div>
            <div class="bg-white rounded-xl shadow-md border border-gray-200 py-1 px-5 text-center">
                <div class="text-xl font-bold text-blue-600" id="totalRecharge">¥0.00</div>
                <div class="text-sm text-gray-600 mt-1">总充值</div>
            </div>
            <div class="bg-white rounded-xl shadow-md border border-gray-200 py-1 px-5 text-center">
                <div class="text-xl font-bold text-blue-600" id="totalExpenditure">¥0.00</div>
                <div class="text-sm text-gray-600 mt-1">总支出</div>
            </div>
            <div class="bg-white rounded-xl shadow-md border border-gray-200 py-1 px-5 text-center">
                <div class="text-xl font-bold text-blue-600" id="currentBalance">¥0.00</div>
                <div class="text-sm text-gray-600 mt-1">当前余额</div>
            </div>
            <!-- 租赁统计卡片 -->

            <div class="bg-white rounded-xl shadow-md border border-gray-200 py-1 px-5 text-center">
                <div class="text-2xl font-bold text-green-600" id="rentalOrderCount">0</div>
                <div class="text-sm text-gray-600 mt-1">租赁订单数</div>
            </div>
            <div class="bg-white rounded-xl shadow-md border border-gray-200 py-1 px-5 text-center">
                <div class="text-2xl font-bold text-green-600" id="rentalExpenditure">¥0.00</div>
                <div class="text-sm text-gray-600 mt-1">租赁支出</div>
            </div>

        </div>
         <!-- 今日统计 -->
        <div class="mb-6">
            <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5">
                <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                    <svg class="w-6 h-6 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <h3 class="text-lg font-semibold text-gray-800">今日统计</h3>
                    <span class="ml-auto text-xs bg-green-50 text-green-700 px-3 py-1 rounded-full">今日数据</span>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
                        <div class="text-xl font-bold text-blue-600" id="todayExpenditure">¥0.00</div>
                        <div class="text-sm text-gray-600 mt-1">今日支出</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
                        <div class="text-xl font-bold text-blue-600" id="todayRecharge">¥0.00</div>
                        <div class="text-sm text-gray-600 mt-1">今日充值</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
                        <div class="text-xl font-bold text-blue-600" id="todayTasks">0</div>
                        <div class="text-sm text-gray-600 mt-1">今日任务</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
                        <div class="text-xl font-bold text-blue-600" id="todayMagnifierTasks">0</div>
                        <div class="text-sm text-gray-600 mt-1">今日放大镜任务</div>
                    </div>
                </div>
            </div>
        </div>
        
        
        <!-- 扇形图表 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
            <!-- 任务类型分布 -->
            <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5">
                <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                    <svg class="w-6 h-6 text-orange-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                    <h3 class="text-lg font-semibold text-gray-800">任务类型占比</h3>
                    <span class="ml-auto text-xs bg-orange-50 text-orange-600 px-3 py-1 rounded-full">分布分析</span>
                </div>
                <div class="chart-container">
                    <canvas id="taskTypeChart"></canvas>
                </div>
            </div>
            
            <!-- 任务状态分布 -->
            <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5">
                <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                    <svg class="w-6 h-6 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                    <h3 class="text-lg font-semibold text-gray-800">任务状态分布</h3>
                    <span class="ml-auto text-xs bg-blue-50 text-blue-700 px-3 py-1 rounded-full">状态分析</span>
                </div>
                <div class="chart-container">
                    <canvas id="taskStatusChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 任务类型详情 -->
        <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5 mb-6">
            <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                <svg class="w-6 h-6 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <h3 class="text-lg font-semibold text-gray-800">任务类型详情</h3>
                <span class="ml-auto text-xs bg-purple-50 text-purple-700 px-3 py-1 rounded-full">详细数据</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3">任务类型</th>
                            <th scope="col" class="px-6 py-3">数量</th>
                            <th scope="col" class="px-6 py-3">占比</th>
                        </tr>
                    </thead>
                    <tbody id="taskTypeTableBody">
                        <tr class="bg-white border-b">
                            <td colspan="3" class="px-6 py-4 text-center text-gray-500">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 7天趋势 -->
        <div class="mb-6">
            <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5">
                <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                    <svg class="w-6 h-6 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
                    <h3 class="text-lg font-semibold text-gray-800">7天数据趋势</h3>
                    <span class="ml-auto text-xs bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full">趋势分析</span>
                </div>
                <div class="chart-container">
                    <canvas id="sevenDayChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 30天趋势 -->
        <div class="mb-6">
            <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5">
                <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-5">
                    <svg class="w-6 h-6 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
                    <h3 class="text-lg font-semibold text-gray-800">30天数据趋势</h3>
                    <span class="ml-auto text-xs bg-purple-50 text-purple-700 px-3 py-1 rounded-full">趋势分析</span>
                </div>
                <div class="chart-container">
                    <canvas id="thirtyDayChart"></canvas>
                </div>
            </div>
        </div>
        
       
    </div>
    
    <script>
        // API接口URL
        const API_URL = '/api/b/v1/statistics/index.php?test=1';
        
        // 图表实例
        let taskTypeChart, taskStatusChart, sevenDayChart, thirtyDayChart;
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            fetchStatisticsData();
            // 监听窗口大小变化，调整图表
            window.addEventListener('resize', handleResize);
        });
        
        // 处理窗口大小变化
        function handleResize() {
            // 销毁图表实例
            if (taskTypeChart) {
                taskTypeChart.destroy();
                taskTypeChart = null;
            }
            if (taskStatusChart) {
                taskStatusChart.destroy();
                taskStatusChart = null;
            }
            if (sevenDayChart) {
                sevenDayChart.destroy();
                sevenDayChart = null;
            }
            if (thirtyDayChart) {
                thirtyDayChart.destroy();
                thirtyDayChart = null;
            }
            
            // 延迟重新获取数据，避免频繁调用
            clearTimeout(window.resizeTimeout);
            window.resizeTimeout = setTimeout(fetchStatisticsData, 300);
        }
        
        // 获取统计数据
        function fetchStatisticsData() {
            fetch(API_URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络请求失败');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.code === 0) {
                        displayStatistics(data.data);
                    } else {
                        showError(data.message);
                    }
                })
                .catch(error => {
                    showError('获取数据失败: ' + error.message);
                });
        }
        
        // 显示统计数据
        function displayStatistics(data) {
            console.log('=== 开始渲染统计数据 ===');
            console.log('完整数据:', data);
            
            // 检查数据结构
            console.log('任务统计数据:', data.task_stats);
            console.log('财务统计数据:', data.financial_stats);
            console.log('交易统计数据:', data.transaction_stats);
            console.log('租赁统计数据:', data.rental_stats);
            console.log('周期统计数据:', data.period_stats);
            
            // 更新概览卡片
            console.log('更新概览卡片...');
            document.getElementById('totalTasks').textContent = data.task_stats.total || 0;
            document.getElementById('totalRecharge').textContent = data.financial_stats.total_recharge_yuan || '¥0.00';
            document.getElementById('totalExpenditure').textContent = data.financial_stats.total_expenditure_yuan || '¥0.00';
            document.getElementById('currentBalance').textContent = data.financial_stats.current_balance_yuan || '¥0.00';
            
            // 更新租赁统计
            console.log('更新租赁统计...');
            document.getElementById('rentalOrderCount').textContent = data.rental_stats.order_count || 0;
            document.getElementById('rentalExpenditure').textContent = data.rental_stats.expenditure_yuan || '¥0.00';
            
            // 更新今日统计
            console.log('更新今日统计...');
            document.getElementById('todayExpenditure').textContent = data.period_stats.today.expenditure_yuan || '¥0.00';
            document.getElementById('todayRecharge').textContent = data.period_stats.today.recharge_yuan || '¥0.00';
            document.getElementById('todayTasks').textContent = data.period_stats.today.tasks || 0;
            document.getElementById('todayMagnifierTasks').textContent = data.period_stats.today.magnifier_tasks || 0;
            
            // 销毁旧的图表实例
            console.log('销毁旧的图表实例...');
            if (taskTypeChart) {
                taskTypeChart.destroy();
                taskTypeChart = null;
            }
            if (taskStatusChart) {
                taskStatusChart.destroy();
                taskStatusChart = null;
            }
            if (sevenDayChart) {
                sevenDayChart.destroy();
                sevenDayChart = null;
            }
            if (thirtyDayChart) {
                thirtyDayChart.destroy();
                thirtyDayChart = null;
            }
            
            // 初始化任务类型分布图表
            console.log('初始化任务类型分布图表...');
            initTaskTypeChart(data.task_stats.by_task_types || []);
            
            // 初始化任务状态分布图表
            console.log('初始化任务状态分布图表...');
            initTaskStatusChart(data.task_stats.by_status || {});
            
            // 初始化7天趋势图表
            console.log('初始化7天趋势图表...');
            initSevenDayChart(data.period_stats.seven_days || []);
            
            // 初始化30天趋势图表
            console.log('初始化30天趋势图表...');
            initThirtyDayChart(data.period_stats.thirty_days || []);
            
            // 渲染任务类型详情表格
            console.log('渲染任务类型详情表格...');
            renderTaskTypeTable(data.task_stats.by_task_types || [], data.task_stats.total || 0);
            
            console.log('=== 数据渲染完成 ===');
        }
        
        // 初始化任务类型分布图表
        function initTaskTypeChart(data) {
            // 准备数据
            let labels = [];
            let counts = [];
            let backgroundColors = [];
            let borderColors = [];
            
            const colors = [
                'rgba(54, 162, 235, 0.8)',
                'rgba(153, 102, 255, 0.8)',
                'rgba(75, 192, 199, 0.8)',
                'rgba(255, 99, 132, 0.8)',
                'rgba(255, 159, 64, 0.8)',
                'rgba(255, 206, 86, 0.8)',
                'rgba(199, 199, 199, 0.8)'
            ];
            
            if (data && Array.isArray(data) && data.length > 0) {
                labels = data.map(item => item.task_types_text || '未知类型');
                counts = data.map(item => item.count || 0);
                
                // 生成颜色
                for (let i = 0; i < data.length; i++) {
                    const color = colors[i % colors.length];
                    backgroundColors.push(color);
                    borderColors.push(color.replace('0.8', '1'));
                }
            } else {
                labels = ['暂无数据'];
                counts = [1];
                backgroundColors = ['rgba(199, 199, 199, 0.8)'];
                borderColors = ['rgba(199, 199, 199, 1)'];
            }
            
            const ctx = document.getElementById('taskTypeChart').getContext('2d');
            taskTypeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        backgroundColor: backgroundColors,
                        borderColor: borderColors,
                        borderWidth: 1,
                        cutout: '70%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                font: {
                                    size: 12
                                },
                                boxWidth: 12,
                                padding: 15
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#333',
                            bodyColor: '#666',
                            borderColor: '#ddd',
                            borderWidth: 1,
                            cornerRadius: 8,
                            padding: 12
                        }
                    },
                    cutout: '70%'
                }
            });
        }
        
        // 初始化任务状态分布图表
        function initTaskStatusChart(data) {
            const ctx = document.getElementById('taskStatusChart').getContext('2d');
            taskStatusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['已发布', '进行中', '已完成', '已取消'],
                    datasets: [{
                        data: [data.published, data.ongoing, data.completed, data.cancelled],
                        backgroundColor: [
                            'rgba(54, 162, 235, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(75, 192, 199, 0.8)',
                            'rgba(255, 99, 132, 0.8)'
                        ],
                        borderColor: [
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 199, 1)',
                            'rgba(255, 99, 132, 1)'
                        ],
                        borderWidth: 1,
                        cutout: '70%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                font: {
                                    size: 12
                                },
                                boxWidth: 12,
                                padding: 15
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#333',
                            bodyColor: '#666',
                            borderColor: '#ddd',
                            borderWidth: 1,
                            cornerRadius: 8,
                            padding: 12
                        }
                    },
                    cutout: '70%'
                }
            });
        }
        
        // 初始化7天趋势图表
        function initSevenDayChart(data) {
            const dates = data.map(item => item.date);
            const expenditures = data.map(item => parseFloat(item.expenditure_yuan));
            const recharges = data.map(item => parseFloat(item.recharge_yuan));
            const tasks = data.map(item => item.tasks);
            
            const ctx = document.getElementById('sevenDayChart').getContext('2d');
            sevenDayChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '支出 (元)',
                            data: expenditures,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: 'white',
                            pointBorderColor: 'rgba(255, 99, 132, 1)',
                            pointBorderWidth: 2
                        },
                        {
                            label: '充值 (元)',
                            data: recharges,
                            borderColor: 'rgba(75, 192, 192, 1)',
                            backgroundColor: 'rgba(75, 192, 192, 0.1)',
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: 'white',
                            pointBorderColor: 'rgba(75, 192, 192, 1)',
                            pointBorderWidth: 2
                        },
                        {
                            label: '任务数量',
                            data: tasks,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: 'white',
                            pointBorderColor: 'rgba(54, 162, 235, 1)',
                            pointBorderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                font: {
                                    size: 12
                                }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            ticks: {
                                font: {
                                    size: 12
                                },
                                maxRotation: 45,
                                minRotation: 0
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: {
                                    size: 12
                                },
                                boxWidth: 12,
                                padding: 15
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#333',
                            bodyColor: '#666',
                            borderColor: '#ddd',
                            borderWidth: 1,
                            cornerRadius: 8,
                            padding: 12
                        }
                    }
                }
            });
        }
        
        // 初始化30天趋势图表
        function initThirtyDayChart(data) {
            const dates = data.map(item => item.date);
            const expenditures = data.map(item => parseFloat(item.expenditure_yuan));
            const recharges = data.map(item => parseFloat(item.recharge_yuan));
            const tasks = data.map(item => item.tasks);
            
            const ctx = document.getElementById('thirtyDayChart').getContext('2d');
            thirtyDayChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '支出 (元)',
                            data: expenditures,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            tension: 0.4,
                            pointRadius: 3,
                            pointHoverRadius: 5,
                            pointBackgroundColor: 'white',
                            pointBorderColor: 'rgba(255, 99, 132, 1)',
                            pointBorderWidth: 2

        // 渲染任务类型详情表格
        function renderTaskTypeTable(data, total) {
            const tableBody = document.getElementById('taskTypeTableBody');
            
            console.log('渲染任务类型详情表格:', data, total);
            
            if (!data || !Array.isArray(data) || data.length === 0) {
                tableBody.innerHTML = `
                    <tr class="bg-white border-b">
                        <td colspan="3" class="px-6 py-4 text-center text-gray-500">暂无数据</td>
                    </tr>
                `;
                console.log('空数据处理:', data);
                console.log('数据总量:', total);
                return;
            }
            
            let html = '';
            data.forEach((item, index) => {
                console.log(`处理任务类型 ${index + 1}:`, item);
                const percentage = total > 0 ? ((item.count / total) * 100).toFixed(2) : '0.00';
                html += `
                    <tr class="bg-white border-b">
                        <td class="px-6 py-4 font-medium text-gray-900">${item.task_types_text || '未知类型'}</td>
                        <td class="px-6 py-4">${item.count || 0}</td>
                        <td class="px-6 py-4">${percentage}%</td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
            console.log('任务类型详情表格渲染完成');
        }
        
        // 显示错误信息
        function showError(message) {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <div class="flex justify-center items-center h-[200px]">
                    <div class="text-center">
                        <h3 class="text-xl font-semibold text-gray-800 mb-4">错误</h3>
                        <p class="text-red-500 mb-6">${message}</p>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors" onclick="fetchStatisticsData()">重试</button>
                    </div>
                </div>
            `;
        }
    </script>
